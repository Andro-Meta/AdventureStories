# Dependabot — keeps GitHub Actions and any future package manifests up
# to date with security advisories. Free for public repos. PRs land
# automatically when a vulnerable dep gets a patch upstream.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Pre-wired for the future React Native port (Phase 4.2). The block is a
  # no-op until package.json exists; uncomment-and-go later.
